apiVersion: apps/v1
kind: Deployment
metadata:
  name: monte-carlo-pi
  namespace: monitoring
  labels:
    app.kubernetes.io/name: monte-carlo-pi
    app.kubernetes.io/component: test-workload
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: monte-carlo-pi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: monte-carlo-pi
        app.kubernetes.io/component: test-workload
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: simulator
          image: python:3.12-alpine
          command: ["python3", "/app/simulator.py"]
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - name: app-code
              mountPath: /app
              readOnly: true
      volumes:
        - name: app-code
          configMap:
            name: monte-carlo-app
