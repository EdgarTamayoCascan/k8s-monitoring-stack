apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: metrics
spec:
  type: NodePort
  ports:
    - name: http
      port: 9090
      targetPort: http
      nodePort: 30900
      protocol: TCP
  selector:
    app.kubernetes.io/name: prometheus
