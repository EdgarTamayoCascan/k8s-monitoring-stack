apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/component: config
data:
  otel-collector.yaml: |
    receivers:
      filelog:
        include:
          - /var/log/pods/*/*/*.log
        exclude:
          - /var/log/pods/*/otel-collector/*.log
        start_at: end
        include_file_path: true
        include_file_name: false
        operators:
          - type: container
            id: container_parser

          - type: regex_parser
            id: extract_metadata
            regex: '^.*\/(?P<namespace>[^_]+)_(?P<pod_name>[^_]+)_[a-f0-9\-]+\/(?P<container_name>[^\/]+)\/.*$'
            parse_from: attributes["log.file.path"]
            preserve_to: attributes["log.file.path"]

          - type: move
            from: attributes.namespace
            to: resource["k8s.namespace.name"]

          - type: move
            from: attributes.pod_name
            to: resource["k8s.pod.name"]

          - type: move
            from: attributes.container_name
            to: resource["k8s.container.name"]

    processors:
      batch:
        send_batch_size: 1000
        timeout: 5s

      resource:
        attributes:
          - key: service.name
            from_attribute: k8s.container.name
            action: upsert
          - key: loki.resource.labels
            value: k8s.namespace.name, k8s.pod.name, k8s.container.name, service.name
            action: insert

    exporters:
      otlphttp/loki:
        endpoint: http://loki.monitoring.svc.cluster.local:3100/otlp
        tls:
          insecure: true

    service:
      telemetry:
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
        logs:
          level: info
      pipelines:
        logs:
          receivers: [filelog]
          processors: [resource, batch]
          exporters: [otlphttp/loki]
