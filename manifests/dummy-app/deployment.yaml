apiVersion: apps/v1
kind: Deployment
metadata:
  name: dummy-logger
  namespace: monitoring
  labels:
    app.kubernetes.io/name: dummy-logger
    app.kubernetes.io/component: test-workload
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: dummy-logger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dummy-logger
        app.kubernetes.io/component: test-workload
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: logger
          image: python:3.12-alpine
          command:
            - python3
            - -c
            - |
              import http.server, random, time, threading, sys, io

              SERVICES = ["auth-service", "payment-api", "user-manager", "order-processor", "notification-hub"]
              LEVELS = ["INFO", "INFO", "INFO", "INFO", "WARN", "ERROR", "DEBUG"]
              USERS = ["alice", "bob", "charlie", "diana", "edgar", "frank"]
              ACTIONS = [
                  "User {user} logged in from {ip}",
                  "Processing request for {user} took {ms}ms",
                  "Database query returned {rows} rows in {ms}ms",
                  "Cache hit ratio: {ratio:.1%}",
                  "Health check passed for {service}",
                  "Connection pool: {active}/{total} active",
                  "Request completed with status {status}",
                  "Retrying failed request (attempt {attempt}/3)",
                  "Rate limit reached for {user}, throttling",
                  "Deployed version {version} to {service}",
                  "Memory usage: {mem}MB / 512MB ({pct:.0%})",
                  "Incoming webhook from {service}: {event}",
              ]
              ERRORS = [
                  "Connection refused to database replica-2",
                  "Timeout waiting for response from {service} after 30s",
                  "Failed to parse JSON payload: unexpected token at position 142",
                  "SSL certificate verification failed for upstream {service}",
                  "Out of memory: killed process {pid}",
                  "Disk space critical: /data is 95% full",
              ]
              WARNINGS = [
                  "Slow query detected: {ms}ms for SELECT on users table",
                  "Deprecated API endpoint /v1/users called by {user}",
                  "Certificate expires in {days} days for {service}.internal",
                  "High latency detected: p99 = {ms}ms",
                  "Queue depth exceeding threshold: {depth}/1000",
              ]
              EVENTS = ["deployment.started", "config.updated", "alert.triggered", "backup.completed"]

              request_count = 0
              error_count = 0
              log_lines = 0

              def gen_ip():
                  return f"10.{random.randint(0,255)}.{random.randint(0,255)}.{random.randint(1,254)}"

              def log_message():
                  global request_count, error_count, log_lines
                  level = random.choice(LEVELS)
                  service = random.choice(SERVICES)
                  user = random.choice(USERS)
                  ctx = dict(user=user, ip=gen_ip(), ms=random.randint(1, 2000),
                             rows=random.randint(0, 10000), ratio=random.random(),
                             service=service, active=random.randint(1, 50),
                             total=50, status=random.choice([200,200,200,201,301,400,404,500]),
                             attempt=random.randint(1, 3), version=f"v1.{random.randint(0,9)}.{random.randint(0,99)}",
                             mem=random.randint(100, 500), pct=random.random(),
                             pid=random.randint(1000, 9999), days=random.randint(1, 30),
                             depth=random.randint(100, 1200), event=random.choice(EVENTS))
                  if level == "ERROR":
                      msg = random.choice(ERRORS).format(**ctx)
                      error_count += 1
                  elif level == "WARN":
                      msg = random.choice(WARNINGS).format(**ctx)
                  else:
                      msg = random.choice(ACTIONS).format(**ctx)
                  request_count += 1
                  log_lines += 1
                  ts = time.strftime("%Y-%m-%dT%H:%M:%S%z")
                  print(f'{ts} [{level:5s}] [{service}] {msg}', flush=True)

              class MetricsHandler(http.server.BaseHTTPRequestHandler):
                  def do_GET(self):
                      if self.path == "/metrics":
                          body = (
                              f"# HELP dummy_requests_total Total dummy requests\n"
                              f"# TYPE dummy_requests_total counter\n"
                              f"dummy_requests_total {request_count}\n"
                              f"# HELP dummy_errors_total Total dummy errors\n"
                              f"# TYPE dummy_errors_total counter\n"
                              f"dummy_errors_total {error_count}\n"
                              f"# HELP dummy_log_lines_total Total log lines emitted\n"
                              f"# TYPE dummy_log_lines_total counter\n"
                              f"dummy_log_lines_total {log_lines}\n"
                          )
                          self.send_response(200)
                          self.send_header("Content-Type", "text/plain")
                          self.end_headers()
                          self.wfile.write(body.encode())
                      else:
                          self.send_response(404)
                          self.end_headers()
                  def log_message(self, fmt, *args):
                      pass  # suppress access logs

              def serve():
                  srv = http.server.HTTPServer(("0.0.0.0", 8080), MetricsHandler)
                  srv.serve_forever()

              threading.Thread(target=serve, daemon=True).start()
              print(f"{time.strftime('%Y-%m-%dT%H:%M:%S%z')} [INFO ] [dummy-logger] Started — emitting logs every 2-8s, metrics on :8080/metrics", flush=True)
              while True:
                  log_message()
                  time.sleep(random.uniform(2, 8))
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
